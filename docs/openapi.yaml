openapi: 3.0.0
info:
  title: API Gestion des Cours Universitaires
  version: 1.0.0
  description: API REST de gestion des cours universitaires (CRUD complet)
servers:
  - url: http://localhost:3000/api
    description: Serveur local de développement
components:
  schemas:
    CoursInput:
      type: object
      required:
        - titre
        - enseignant
        - volumeHoraire
      properties:
        titre:
          type: string
          example: "Services Web"
        enseignant:
          type: string
          example: "Dr. Somda"
        volumeHoraire:
          type: integer
          minimum: 1
          example: 30
        actif:
          type: boolean
          default: true
          example: true
    CoursPatch:
      type: object
      properties:
        titre:
          type: string
          example: "Services Web Avancés"
        enseignant:
          type: string
          example: "Dr. Somda"
        volumeHoraire:
          type: integer
          minimum: 1
          example: 40
        actif:
          type: boolean
          example: false
    CoursResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        titre:
          type: string
          example: "Services Web"
        enseignant:
          type: string
          example: "Dr. Somda"
        volume_horaire:
          type: integer
          example: 30
        actif:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
paths:
  /cours:
    get:
      summary: Lister tous les cours
      tags: [Cours]
      responses:
        '200':
          description: Liste de tous les cours
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CoursResponse'
    post:
      summary: Créer un cours
      tags: [Cours]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoursInput'
      responses:
        '201':
          description: Cours créé avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/CoursResponse'
        '400':
          description: Données invalides
  /cours/{id}:
    get:
      summary: Consulter un cours par ID
      tags: [Cours]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Cours trouvé
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/CoursResponse'
        '404':
          description: Cours non trouvé
    put:
      summary: Modifier complètement un cours
      tags: [Cours]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoursInput'
      responses:
        '200':
          description: Cours mis à jour avec succès
        '400':
          description: Données invalides
        '404':
          description: Cours non trouvé
    patch:
      summary: Modifier partiellement un cours (JSON Patch RFC 6902)
      tags: [Cours]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              type: array
              items:
                type: object
                required: [op, path, value]
                properties:
                  op:
                    type: string
                    enum: [replace]
                    example: replace
                  path:
                    type: string
                    enum: [/titre, /enseignant, /volumeHoraire, /actif]
                    example: /volumeHoraire
                  value:
                    example: 40
            example:
              - op: replace
                path: /volumeHoraire
                value: 40
              - op: replace
                path: /actif
                value: false
      responses:
        '200':
          description: Cours modifié partiellement
        '400':
          description: Opération invalide ou aucun champ fourni
        '404':
          description: Cours non trouvé
    delete:
      summary: Supprimer un cours
      tags: [Cours]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Cours supprimé avec succès
        '404':
          description: Cours non trouvé
